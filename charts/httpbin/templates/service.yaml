apiVersion: v1
kind: Service
metadata:
   namespace: {{ .Values.namespace.name}}
   name: service-httpbin
spec:
  ports:
    - port: {{ .Values.service.port}}
      targetPort: {{ .Values.service.targetPort}}
      protocol: TCP
  type: {{ .Values.service.type}}
  selector:
    app.kubernetes.io/name: httpbin
