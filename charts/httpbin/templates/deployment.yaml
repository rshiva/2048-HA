apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Values.namespace.name}}
  name: httpbin
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbin
    spec:
      containers:
        - image: "{{ .Values.image.repository }}:{{ .Values.image.tag}}"
          imagePullPolicy: {{ .Values.image.pullPolicy}}
          name: httpbin
          ports:
          - containerPort: 80
