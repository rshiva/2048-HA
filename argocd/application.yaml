apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
   name: game-2048
   namespace: argocd
spec:
  project: default
  source:
    repoURL:
    targetRevision:
    path:
        helm:
          valueFiles:
              -
  destination:
     server: https://kubernetes.default.svc
     namespace: game-2048
  syncpolicy:
    automated:
      prune: true
      selfHeal: true
      verify: true
