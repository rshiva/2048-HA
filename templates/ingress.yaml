apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: service-2048
  namespace: {{ .Values.namespace.name}}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4}}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className}}
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: service-2048
              port:
                number: 80
